<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>DC-AR</title>
<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020818;color:#fff;font-family:sans-serif;overflow:hidden}

/* 시작화면 */
#splash{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#020818,#041430);display:flex;flex-direction:column;align-items:center;justify-content:center}
#splash.hide{display:none}
.logo{font-size:4rem;font-weight:900;background:linear-gradient(135deg,#00b4d8,#0077b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 20px rgba(0,180,216,.5))}
.sub{color:#90e0ef;letter-spacing:4px;margin-top:8px}
.desc{color:#aaa;text-align:center;line-height:1.8;margin-top:16px;font-size:.9rem}
.mbox{margin:18px auto 0;width:100px;height:100px;border:2px solid #00b4d8;display:flex;align-items:center;justify-content:center}
.hiro{width:82px;height:82px;background:#fff;display:flex;align-items:center;justify-content:center}
.hi{width:50px;height:50px;background:#000;display:flex;align-items:center;justify-content:center}
.hx{width:22px;height:22px;background:#fff;clip-path:polygon(40% 0%,60% 0%,60% 40%,100% 40%,100% 60%,60% 60%,60% 100%,40% 100%,40% 60%,0% 60%,0% 40%,40% 40%)}
.mlbl{font-size:.55rem;color:#00b4d8;letter-spacing:2px;margin-top:6px;text-align:center}
.sbtn{margin-top:20px;padding:13px 44px;background:transparent;border:2px solid #00b4d8;color:#00b4d8;font-size:1rem;font-weight:700;letter-spacing:4px;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.sbtn:active{background:#00b4d8;color:#000}

/* AR 씬 */
#arsc{display:none;position:fixed;inset:0;z-index:10}

/* ====== 모든 UI는 AR 씬과 별개로 최상위 ====== */

/* 상단 바 */
#topbar{position:fixed;top:0;left:0;right:0;z-index:1000;padding:12px 14px;background:linear-gradient(180deg,rgba(0,0,0,.8),transparent);display:none;justify-content:space-between;align-items:center}
#topbar.on{display:flex}
.ttl{font-size:.68rem;color:#00b4d8;letter-spacing:3px}
.tst{display:flex;align-items:center;gap:6px;font-size:.62rem;color:#90e0ef}
.dot{width:8px;height:8px;border-radius:50%;background:#00ff88;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* 스캔 가이드 */
#sg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1000;text-align:center;display:none}
#sg.on{display:block}
.sf{width:160px;height:160px;border:2px solid rgba(0,180,216,.6);border-radius:6px;margin:0 auto 10px;position:relative;animation:sp 2s ease-in-out infinite}
@keyframes sp{0%,100%{opacity:.6}50%{opacity:1}}
.sl{position:absolute;left:4px;right:4px;height:2px;background:linear-gradient(90deg,transparent,#00b4d8,transparent);animation:sl 2s ease-in-out infinite}
@keyframes sl{0%{top:4px;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:calc(100% - 6px);opacity:0}}
.st{font-size:.66rem;color:#90e0ef;letter-spacing:2px}

/* 모드 배너 */
#banner{position:fixed;top:52px;left:50%;transform:translateX(-50%);z-index:1000;background:rgba(0,0,0,.6);border:1px solid rgba(0,180,216,.5);border-radius:20px;padding:5px 16px;font-size:.7rem;color:#00b4d8;letter-spacing:2px;display:none;white-space:nowrap}
#banner.on{display:block}

/* 오른쪽 오버레이 */
#ov{position:fixed;top:52px;right:10px;z-index:1000;width:52vw;max-width:210px;background:rgba(2,8,24,.9);border:1px solid rgba(0,180,216,.4);border-radius:8px;padding:10px 12px;display:none}
#ov.on{display:block;animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateX(8px)}to{opacity:1;transform:translateX(0)}}
.ovtag{font-size:.5rem;color:#00b4d8;letter-spacing:2px;margin-bottom:4px;font-family:monospace}
.ovtit{font-size:.82rem;font-weight:700;color:#fff;margin-bottom:6px}
.ovbod{font-size:.72rem;color:#90e0ef;line-height:1.7}
.mb{margin:4px 0}
.mbt{display:flex;justify-content:space-between;font-size:.68rem;color:#adb5bd;margin-bottom:2px}
.mbb{height:5px;background:rgba(255,255,255,.1);border-radius:3px}
.mbf{height:100%;border-radius:3px;width:0;transition:width .7s ease}

/* 왼쪽 AI 흐름 */
#flow{position:fixed;top:52px;left:10px;z-index:1000;width:46vw;max-width:180px;background:rgba(2,8,24,.9);border:1px solid rgba(0,255,136,.3);border-radius:8px;padding:10px 12px;display:none}
#flow.on{display:block;animation:fi .3s ease}
.ftag{font-size:.5rem;color:#00ff88;letter-spacing:2px;margin-bottom:6px;font-family:monospace}
.fst{display:flex;align-items:center;gap:7px;padding:3px 0;font-size:.74rem;color:#444;transition:color .3s;border-bottom:1px solid rgba(255,255,255,.04)}
.fst:last-child{border:none}
.fst.act{color:#00b4d8}
.fst.don{color:#00ff88}
.fst.brk{color:#ff6b35;text-decoration:line-through}
.fdot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.farr{font-size:.55rem;color:inherit;margin-left:auto}

/* 세부 버튼 행 */
#arow{position:fixed;bottom:86px;left:0;right:0;z-index:1000;padding:0 8px 5px;display:none}
#arow.on{display:block;animation:su .25s ease}
@keyframes su{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.albl{font-size:.53rem;color:#00b4d8;letter-spacing:2px;margin-bottom:4px;padding-left:2px}
.abtns{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.abtns::-webkit-scrollbar{display:none}
.dbtn{flex-shrink:0;padding:9px 13px;background:rgba(0,0,0,.7);border:1.5px solid rgba(0,180,216,.5);color:#90e0ef;font-size:.73rem;font-weight:700;border-radius:4px;cursor:pointer;white-space:nowrap;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none}
.dbtn:active,.dbtn.act{background:rgba(0,180,216,.25);border-color:#00b4d8;color:#00b4d8}
.dbtn.d{border-color:rgba(255,107,53,.5);color:#ff9966}
.dbtn.d:active{background:rgba(255,107,53,.2);color:#ff6b35}
.dbtn.g{border-color:rgba(0,255,136,.4);color:#66ffaa}
.dbtn.g:active{background:rgba(0,255,136,.15);color:#00ff88}

/* 하단 메인 버튼 */
#bot{position:fixed;bottom:0;left:0;right:0;z-index:1000;padding:8px 8px 14px;background:linear-gradient(0deg,rgba(0,0,0,.9),transparent);display:none}
#bot.on{display:block}
.bgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.mbtn{padding:9px 4px;background:rgba(0,0,0,.7);border:1.5px solid rgba(0,180,216,.5);color:#90e0ef;font-size:.72rem;font-weight:700;border-radius:4px;text-align:center;touch-action:manipulation;-webkit-tap-highlight-color:transparent;cursor:pointer;user-select:none;transition:all .15s}
.mbtn:active,.mbtn.sel{background:rgba(0,180,216,.25);border-color:#00b4d8;color:#00b4d8}

/* 토스트 */
#toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:2000;background:rgba(0,180,216,.2);border:1px solid rgba(0,180,216,.6);color:#00b4d8;font-size:.62rem;letter-spacing:1px;padding:7px 16px;border-radius:20px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .3s}
#toast.on{opacity:1}
</style>
</head>
<body>

<div id="splash">
  <div class="logo">DC-AR</div>
  <div class="sub">내 방 위의 AI 데이터센터</div>
  <p class="desc">HIRO 마커를 카메라에 비추면<br>미니 AI 데이터센터가 소환됩니다</p>
  <div class="mbox"><div class="hiro"><div class="hi"><div class="hx"></div></div></div></div>
  <div class="mlbl">▲ HIRO MARKER</div>
  <button class="sbtn" onclick="startAR()">▶ AR 시작</button>
</div>

<a-scene id="arsc" embedded arjs="sourceType:webcam;debugUIEnabled:false;" vr-mode-ui="enabled:false" renderer="antialias:true;">
  <a-marker preset="hiro" id="mk" smooth="true">
    <a-box position="0 -0.02 0" width="3.2" height="0.04" depth="2.2" color="#051428"></a-box>

      <a-box id="led1b" position="0 0.1 0.295" width="0.25" height="0.03" depth="0.01" color="#00ff88" animation="property:material.opacity;from:0.2;to:1;dur:600;loop:true;dir:alternate"></a-box>
      <a-box id="led1c" position="0 -0.1 0.295" width="0.25" height="0.03" depth="0.01" color="#00b4d8" animation="property:material.opacity;from:1;to:0.3;dur:1000;loop:true;dir:alternate"></a-box>
      <a-sphere id="top1" position="0 0.47 0.295" radius="0.025" color="#00ff88" material="emissive:#00ff88;" animation="property:material.emissiveIntensity;from:0.5;to:2;dur:1000;loop:true;dir:alternate"></a-sphere>
    </a-entity>
    <a-entity position="-0.65 0 -0.6">
      <a-box width="0.35" height="0.9" depth="0.55" color="#0a1628"></a-box>
      <a-box id="led2a" position="0 0.3 0.295" width="0.25" height="0.03" depth="0.01" color="#00ff88" animation="property:material.opacity;from:0.3;to:1;dur:500;loop:true;dir:alternate"></a-box>
      <a-box id="led2b" position="0 0.05 0.295" width="0.25" height="0.03" depth="0.01" color="#00b4d8" animation="property:material.opacity;from:1;to:0.2;dur:900;loop:true;dir:alternate"></a-box>
      <a-sphere id="top2" position="0 0.47 0.295" radius="0.025" color="#ff6b35" material="emissive:#ff6b35;" animation="property:material.emissiveIntensity;from:0.5;to:2;dur:800;loop:true;dir:alternate"></a-sphere>
    </a-entity>
    <a-entity position="-0.2 0 -0.6">
      <a-box width="0.35" height="0.9" depth="0.55" color="#0a1628"></a-box>
      <a-box id="led3a" position="0 0.25 0.295" width="0.25" height="0.04" depth="0.01" color="#00b4d8" animation="property:material.opacity;from:1;to:0.1;dur:400;loop:true;dir:alternate"></a-box>
      <a-box id="led3b" position="0 0.05 0.295" width="0.25" height="0.04" depth="0.01" color="#00ff88" animation="property:material.opacity;from:0.5;to:1;dur:750;loop:true;dir:alternate"></a-box>
      <a-sphere id="top3" position="0 0.47 0.295" radius="0.025" color="#00ff88" material="emissive:#00ff88;" animation="property:material.emissiveIntensity;from:0.5;to:2;dur:600;loop:true;dir:alternate"></a-sphere>
    </a-entity>
    <a-entity position="0.4 0 -0.55">
      <a-box width="0.6" height="0.8" depth="0.5" color="#081220"></a-box>
      <a-entity position="-0.12 0.15 0.28"><a-cylinder height="0.02" radius="0.1" color="#1a2f4a"></a-cylinder><a-entity animation="property:rotation;to:0 0 360;dur:800;loop:true;easing:linear;"><a-box position="0 0.015 0" width="0.18" height="0.02" depth="0.04" color="#00b4d8"></a-box><a-box position="0 0.015 0" width="0.04" height="0.02" depth="0.18" color="#00b4d8"></a-box></a-entity></a-entity>
      <a-entity position="0.12 0.15 0.28"><a-cylinder height="0.02" radius="0.1" color="#1a2f4a"></a-cylinder><a-entity animation="property:rotation;to:0 0 -360;dur:1000;loop:true;easing:linear;"><a-box position="0 0.015 0" width="0.18" height="0.02" depth="0.04" color="#90e0ef"></a-box><a-box position="0 0.015 0" width="0.04" height="0.02" depth="0.18" color="#90e0ef"></a-box></a-entity></a-entity>
      <a-sphere id="cool" position="-0.18 -0.28 0.27" radius="0.05" color="#00b4d8" material="emissive:#00b4d8;emissiveIntensity:1;" animation="property:position;from:-0.18 -0.28 0.27;to:0.18 -0.28 0.27;dur:1500;loop:true;dir:alternate;easing:easeInOutSine;"></a-sphere>
    </a-entity>
    <a-entity position="0.4 0 0.35">
      <a-box width="0.6" height="0.18" depth="0.4" color="#080f1e"></a-box>
      <a-sphere id="port1" position="-0.2 0.1 0.21" radius="0.015" color="#00ff88" material="emissive:#00ff88;" animation="property:material.emissiveIntensity;from:0.5;to:3;dur:300;loop:true;dir:alternate"></a-sphere>
      <a-sphere id="port2" position="-0.13 0.1 0.21" radius="0.015" color="#00b4d8" material="emissive:#00b4d8;" animation="property:material.emissiveIntensity;from:0.5;to:3;dur:500;loop:true;dir:alternate"></a-sphere>
      <a-sphere id="port3" position="-0.06 0.1 0.21" radius="0.015" color="#ff6b35" material="emissive:#ff6b35;" animation="property:material.emissiveIntensity;from:0.5;to:3;dur:700;loop:true;dir:alternate"></a-sphere>
      <a-sphere id="pkt1" radius="0.022" color="#00b4d8" material="emissive:#00b4d8;emissiveIntensity:2;" animation="property:position;from:-0.28 0.05 0.2;to:0.28 0.05 0.2;dur:1200;loop:true;easing:linear;"></a-sphere>
    </a-entity>
    <a-entity position="-0.7 0 0.4">
      <a-box width="0.4" height="0.5" depth="0.35" color="#060d1a"></a-box>
      <a-sphere id="upsled" position="0 0.26 0.19" radius="0.03" color="#00ff88" material="emissive:#00ff88;emissiveIntensity:1.5;" animation="property:material.emissiveIntensity;from:1;to:3;dur:2000;loop:true;dir:alternate"></a-sphere>
      <a-text value="UPS" position="0 -0.28 0.18" align="center" color="#ff6b35" width="1" font="mozillavr"></a-text>
    </a-entity>
    <a-entity position="1.1 0 0.4">
      <a-box width="0.5" height="0.45" depth="0.7" color="#0c1a0c"></a-box>
      <a-sphere id="genled" position="0 -0.1 0.375" radius="0.03" color="#00ff88" material="emissive:#00ff88;emissiveIntensity:1.5;" animation="property:material.emissiveIntensity;from:1;to:3;dur:1500;loop:true;dir:alternate"></a-sphere>
      <a-text value="GEN" position="0 -0.28 0.37" align="center" color="#00ff88" width="1" font="mozillavr"></a-text>
    </a-entity>
    <a-sphere id="pwr1" radius="0.025" color="#ff6b35" material="emissive:#ff6b35;emissiveIntensity:2;" animation="property:position;from:1.1 0.07 0.4;to:-0.7 0.07 0.4;dur:1800;loop:true;easing:linear;"></a-sphere>
    <a-sphere id="pwr2" radius="0.025" color="#ffdd00" material="emissive:#ffdd00;emissiveIntensity:2;" animation="property:position;from:-0.7 0.07 0.4;to:-0.7 0.07 -0.6;dur:1400;loop:true;easing:linear;"></a-sphere>
    <a-entity id="airing" visible="false" position="0 1.1 0">
      <a-torus radius="0.28" radius-tubular="0.02" color="#00b4d8" material="emissive:#00b4d8;emissiveIntensity:1;" animation="property:rotation;to:0 360 0;dur:2500;loop:true;easing:linear;"></a-torus>
    </a-entity>
    <a-sphere id="aiball" visible="false" radius="0.06" color="#00b4d8" material="emissive:#00b4d8;emissiveIntensity:2;" animation="property:position;from:-0.8 0.8 0;to:0.8 0.8 0;dur:2000;loop:true;dir:alternate;easing:easeInOutSine;"></a-sphere>
    <a-text value="AI DATA CENTER" position="0 1.1 0" align="center" color="#00b4d8" width="3" font="mozillavr" opacity="0.7"></a-text>
  </a-marker>
  <a-entity camera></a-entity>
</a-scene>

<!-- 모든 UI: fixed로 최상위 -->
<div id="topbar">
  <div class="ttl">DC-AR // AI DATACENTER</div>
  <div class="tst"><div class="dot"></div><span id="stxt">마커 탐색 중...</span></div>
</div>
<div id="sg"><div class="sf"><div class="sl"></div></div><div class="st">HIRO 마커를 카메라에 비추세요</div></div>
<div id="banner"></div>
<div id="ov"><div class="ovtag" id="otag"></div><div class="ovtit" id="otit"></div><div class="ovbod" id="obod"></div></div>
<div id="flow">
  <div class="ftag">AI PIPELINE</div>
  <div class="fst" id="fs0"><div class="fdot"></div>데이터 수집<span class="farr">→</span></div>
  <div class="fst" id="fs1"><div class="fdot"></div>전처리<span class="farr">→</span></div>
  <div class="fst" id="fs2"><div class="fdot"></div>모델 학습<span class="farr">→</span></div>
  <div class="fst" id="fs3"><div class="fdot"></div>추론/배포<span class="farr">✓</span></div>
</div>
<div id="arow"><div class="albl" id="albl">세부 액션</div><div class="abtns" id="abtns"></div></div>
<div id="bot">
  <div class="bgrid">
    <button class="mbtn" id="b1" onclick="doServer()">🖥 서버</button>
    <button class="mbtn" id="b2" onclick="doTemp()">🌡 온도</button>
    <button class="mbtn" id="b3" onclick="doAI()">🤖 AI학습</button>
    <button class="mbtn" id="b4" onclick="doPower()">⚡ 전력</button>
    <button class="mbtn" id="b5" onclick="doCable()">🔌 케이블</button>
  </div>
</div>
<div id="toast"></div>

<script>
// ── 헬퍼 ──
function $(id){return document.getElementById(id);}

var tTmr=null,aiTmr=null,aiRunning=false,aiStep=0,tempTmr=null,pwrTmr=null;

function toast(m){
  $('toast').textContent=m;
  $('toast').classList.add('on');
  if(tTmr)clearTimeout(tTmr);
  tTmr=setTimeout(function(){$('toast').classList.remove('on');},2500);
}

function banner(t){$('banner').textContent=t;$('banner').classList.add('on');}
function hideBanner(){$('banner').classList.remove('on');}

function showOv(tag,tit,html){
  $('otag').textContent=tag;
  $('otit').textContent=tit;
  $('obod').innerHTML=html;
  $('ov').classList.add('on');
  setTimeout(function(){
    document.querySelectorAll('.mbf[data-w]').forEach(function(e){
      e.style.width=e.getAttribute('data-w')+'%';
    });
  },80);
}
function hideOv(){$('ov').classList.remove('on');}

function showFlow(){$('flow').classList.add('on');}
function hideFlow(){$('flow').classList.remove('on');}

function setFS(idx,cls){
  for(var i=0;i<4;i++){
    var e=$('fs'+i);
    e.classList.remove('act','don','brk');
    if(i<idx)e.classList.add('don');
    else if(i===idx)e.classList.add(cls||'act');
  }
}
function resetFS(){for(var i=0;i<4;i++){$('fs'+i).classList.remove('act','don','brk');}}

function mb(lbl,pct,col){
  return '<div class="mb"><div class="mbt"><span>'+lbl+'</span><span style="color:'+col+';font-weight:700;">'+pct+'%</span></div>'
    +'<div class="mbb"><div class="mbf" data-w="'+pct+'" style="background:'+col+'"></div></div></div>';
}

function setLED(id,col){var e=$(id);if(e)e.setAttribute('color',col);}
function setEm(id,col){var e=$(id);if(e)e.setAttribute('material','emissive:'+col+';emissiveIntensity:2;');}

// 세부 버튼 행
function openRow(lbl,btns){
  $('albl').textContent=lbl;
  var w=$('abtns');
  w.innerHTML='';
  btns.forEach(function(b){
    var el=document.createElement('button');
    el.className='dbtn'+(b.c?' '+b.c:'');
    el.textContent=b.l;
    var fn=b.fn;
    el.onclick=function(){
      w.querySelectorAll('.dbtn').forEach(function(x){x.classList.remove('act');});
      el.classList.add('act');
      fn();
    };
    w.appendChild(el);
  });
  $('arow').classList.add('on');
}
function closeRow(){$('arow').classList.remove('on');}

function selBtn(id){
  ['b1','b2','b3','b4','b5'].forEach(function(b){$(b).classList.remove('sel');});
  if(id)$(id).classList.add('sel');
}

function resetAll(){
  if(tempTmr){clearInterval(tempTmr);tempTmr=null;}
  if(pwrTmr){clearInterval(pwrTmr);pwrTmr=null;}
  stopAI();
  hideOv();hideFlow();hideBanner();closeRow();
  setLED('led1a','#00b4d8');setLED('led1b','#00ff88');setLED('led1c','#00b4d8');
  setLED('led2a','#00ff88');setLED('led2b','#00b4d8');
  setLED('led3a','#00b4d8');setLED('led3b','#00ff88');
}

function stopAI(){
  if(aiTmr){clearTimeout(aiTmr);aiTmr=null;}
  aiRunning=false;
  try{$('airing').setAttribute('visible','false');}catch(e){}
  try{$('aiball').setAttribute('visible','false');}catch(e){}
}

// ── AR 시작 ──
function startAR(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    alert('Chrome 또는 Safari를 사용하세요.');return;
  }
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
    .then(function(s){s.getTracks().forEach(function(t){t.stop();});launchAR();})
    .catch(function(e){alert('카메라 권한을 허용해주세요.\n'+e.message);});
}

function launchAR(){
  $('splash').classList.add('hide');
  $('arsc').style.display='block';
  $('topbar').classList.add('on');
  $('sg').classList.add('on');
  $('bot').classList.add('on');

  function bind(){
    var mk=$('mk');
    if(!mk){setTimeout(bind,300);return;}
    mk.addEventListener('markerFound',function(){
      $('sg').classList.remove('on');
      $('stxt').textContent='데이터센터 활성화 ✓';
      toast('🏗 AI 데이터센터 소환됨');
    });
    mk.addEventListener('markerLost',function(){
      $('sg').classList.add('on');
      $('stxt').textContent='마커 탐색 중...';
    });
  }
  var sc=$('arsc');
  if(sc.hasLoaded){bind();}
  else{sc.addEventListener('loaded',bind);setTimeout(bind,1000);}
}

// ── AI 학습 ──
function doAI(){
  resetAll();selBtn('b3');banner('🤖 AI TRAINING');showFlow();resetFS();
  openRow('AI 파이프라인',[
    {l:'▶ 학습 시작',c:'g',fn:function(){if(aiRunning){toast('이미 학습 중');return;}startTrain();}},
    {l:'⏸ 학습 중단',c:'d',fn:function(){if(!aiRunning){toast('학습 중이 아님');return;}pauseTrain();}},
    {l:'📊 현재 상태',c:'',fn:function(){showOv('AI STATUS','학습 현황',mb('Loss',Math.round(20+Math.random()*30),'#ff6b35')+mb('Accuracy',Math.round(70+Math.random()*20),'#00ff88')+'<div style="font-size:.68rem;color:#adb5bd;margin-top:3px;">lr: 0.001 | epoch: '+Math.round(aiStep*12)+'</div>');toast('📊 현재 상태');}},
    {l:'🔄 초기화',c:'d',fn:function(){stopAI();resetFS();banner('🔄 초기화 완료');showOv('RESET','초기화','<div style="color:#ffdd00;">파이프라인 초기화됨</div>');toast('🔄 초기화 완료');}},
  ]);
  toast('🤖 AI 연결됨');
}

function startTrain(){
  aiRunning=true;aiStep=0;
  try{$('airing').setAttribute('visible','true');}catch(e){}
  try{$('aiball').setAttribute('visible','true');}catch(e){}
  var steps=['데이터 수집','전처리','모델 학습','추론/배포'];
  var cols=['#90e0ef','#00b4d8','#00ff88','#ffdd00'];
  function run(){
    if(!aiRunning||aiStep>=4){
      if(aiStep>=4){
        banner('✅ AI 학습 완료!');
        showOv('COMPLETE','학습 완료!',mb('Accuracy',94,'#00ff88')+mb('Loss',6,'#00b4d8')+'<div style="font-size:.68rem;color:#00ff88;margin-top:3px;">✅ 모델 배포 완료</div>');
        toast('✅ 학습 완료!');stopAI();
      }
      return;
    }
    setFS(aiStep,'act');
    banner('🤖 '+steps[aiStep]+' 중...');
    var c=cols[aiStep];
    setLED('led1a',c);setLED('led2a',c);setLED('led3a',c);
    showOv('STEP '+(aiStep+1)+'/4',steps[aiStep],mb('진행률',Math.round((aiStep+1)/4*100),'#00b4d8')+'<div style="font-size:.68rem;color:#90e0ef;margin-top:3px;">처리 중...</div>');
    toast('→ '+steps[aiStep]);
    aiStep++;aiTmr=setTimeout(run,2500);
  }
  run();
}

function pauseTrain(){
  if(aiTmr){clearTimeout(aiTmr);aiTmr=null;}
  aiRunning=false;
  setLED('led1a','#ff6b35');setLED('led2a','#ff6b35');setLED('led3a','#ff6b35');
  if(aiStep>0)setFS(aiStep-1,'brk');
  try{$('aiball').setAttribute('visible','false');}catch(e){}
  banner('⏸ 학습 중단 — '+aiStep+'/4단계');
  showOv('PAUSED','학습 중단','<div style="color:#ff6b35;margin-bottom:5px;">⚠ '+['데이터 수집','전처리','모델 학습','추론'][Math.max(0,aiStep-1)]+' 단계에서 중단</div><div style="font-size:.68rem;color:#adb5bd;">체크포인트 자동 저장<br>▶ 학습 시작으로 재개 가능</div>');
  toast('⏸ 중단 — LED 적색 표시');
}
