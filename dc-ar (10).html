<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>DC-AR | AI 데이터센터</title>
<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;font-family:sans-serif;overflow:hidden;color:#fff}

/* ── 시작화면 ── */
#splash{position:fixed;inset:0;z-index:999;background:linear-gradient(135deg,#020818,#041430);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s}
#splash.hide{opacity:0;pointer-events:none}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,180,216,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(0,180,216,.07) 1px,transparent 1px);background-size:40px 40px;animation:gm 8s linear infinite}
@keyframes gm{to{background-position:40px 40px}}
.logo{font-size:clamp(3rem,12vw,5rem);font-weight:900;background:linear-gradient(135deg,#00b4d8,#0077b6,#90e0ef);-webkit-background-clip:text;-webkit-text-fill-color:transparent;position:relative;z-index:1;filter:drop-shadow(0 0 30px rgba(0,180,216,.6))}
.sub{font-size:1rem;color:#90e0ef;letter-spacing:4px;margin-top:8px;position:relative;z-index:1}
.desc{margin-top:16px;font-size:.88rem;color:#aaa;text-align:center;line-height:1.8;position:relative;z-index:1}
.mbox{margin:18px auto 0;width:110px;height:110px;border:2px solid #00b4d8;border-radius:4px;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;animation:mp 2s ease-in-out infinite}
@keyframes mp{0%,100%{box-shadow:0 0 0 0 rgba(0,180,216,.4)}50%{box-shadow:0 0 0 10px rgba(0,180,216,0)}}
.hiro{width:82px;height:82px;background:#fff;display:flex;align-items:center;justify-content:center}
.hiro-in{width:50px;height:50px;background:#000;display:flex;align-items:center;justify-content:center}
.hiro-x{width:22px;height:22px;background:#fff;clip-path:polygon(40% 0%,60% 0%,60% 40%,100% 40%,100% 60%,60% 60%,60% 100%,40% 100%,40% 60%,0% 60%,0% 40%,40% 40%)}
.mlbl{margin-top:6px;font-size:.56rem;color:#00b4d8;letter-spacing:2px;text-align:center;position:relative;z-index:1}
.sbtn{margin-top:20px;padding:12px 40px;background:transparent;border:2px solid #00b4d8;color:#00b4d8;font-size:1rem;font-weight:700;letter-spacing:4px;cursor:pointer;position:relative;z-index:1;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.sbtn:active{background:#00b4d8;color:#000}

/* ── AR 씬 ── */
#ar-scene{display:none;position:fixed;inset:0;z-index:50}

/* ── AR UI 전체 래퍼 ── */
#ar-ui{position:fixed;inset:0;z-index:100;display:none;pointer-events:none}
#ar-ui.on{display:block}

/* ── 상단 HUD ── */
.htop{position:absolute;top:0;left:0;right:0;padding:12px 14px;background:linear-gradient(180deg,rgba(0,0,0,.75),transparent);display:flex;justify-content:space-between;align-items:center;pointer-events:none}
.htitle{font-size:.68rem;color:#00b4d8;letter-spacing:3px}
.hstat{display:flex;align-items:center;gap:6px;font-size:.62rem;color:#90e0ef}
.dot{width:8px;height:8px;border-radius:50%;background:#00ff88;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── 스캔 가이드 ── */
#sg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}
.sf{width:160px;height:160px;border:2px solid rgba(0,180,216,.6);border-radius:6px;margin:0 auto 10px;position:relative;animation:sp 2s ease-in-out infinite}
@keyframes sp{0%,100%{opacity:.6}50%{opacity:1}}
.sl{position:absolute;left:4px;right:4px;height:2px;background:linear-gradient(90deg,transparent,#00b4d8,transparent);animation:sl 2s ease-in-out infinite}
@keyframes sl{0%{top:4px;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:calc(100% - 6px);opacity:0}}
.st{font-size:.66rem;color:#90e0ef;letter-spacing:2px;animation:blink 2s infinite}

/* ── 모드 표시 배너 (3D 위 반투명) ── */
#mode-banner{
  position:absolute;top:56px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.45);border:1px solid rgba(0,180,216,.5);
  border-radius:20px;padding:6px 18px;
  font-size:.72rem;color:#00b4d8;letter-spacing:2px;
  pointer-events:none;display:none;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  white-space:nowrap;
}
#mode-banner.on{display:block}

/* ── 3D 위 반투명 결과 오버레이 ── */
#overlay{
  position:absolute;
  /* 화면 오른쪽 상단 — 3D 모델 안 가림 */
  top:56px;right:10px;
  width:52vw;max-width:210px;
  background:rgba(2,8,24,.72);
  border:1px solid rgba(0,180,216,.35);
  border-radius:8px;
  padding:10px 12px;
  pointer-events:none;
  display:none;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
#overlay.on{display:block;animation:fi .3s ease}
@keyframes fi{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
.ov-tag{font-size:.52rem;color:#00b4d8;letter-spacing:2px;margin-bottom:5px;font-family:monospace}
.ov-title{font-size:.85rem;font-weight:700;color:#fff;margin-bottom:7px}
.ov-body{font-size:.74rem;color:#90e0ef;line-height:1.7}
.mb{margin:4px 0}
.mbt{display:flex;justify-content:space-between;font-size:.68rem;color:#adb5bd;margin-bottom:2px}
.mbb{height:5px;background:rgba(255,255,255,.08);border-radius:3px}
.mbf{height:100%;border-radius:3px;width:0;transition:width .8s ease}

/* ── AI 흐름 시각화 오버레이 ── */
#flow-overlay{
  position:absolute;top:56px;left:10px;
  width:48vw;max-width:190px;
  background:rgba(2,8,24,.72);
  border:1px solid rgba(0,255,136,.25);
  border-radius:8px;padding:10px 12px;
  pointer-events:none;display:none;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
#flow-overlay.on{display:block;animation:fi .3s ease}
.fl-tag{font-size:.52rem;color:#00ff88;letter-spacing:2px;margin-bottom:6px;font-family:monospace}
.fl-step{display:flex;align-items:center;gap:7px;padding:4px 0;font-size:.76rem;color:#444;border-bottom:1px solid rgba(255,255,255,.04);transition:color .3s}
.fl-step:last-child{border:none}
.fl-step.active{color:#00b4d8}
.fl-step.done{color:#00ff88}
.fl-step.broken{color:#ff6b35;text-decoration:line-through}
.fsdot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
.fl-arrow{font-size:.6rem;color:#333;margin-left:auto}
.fl-step.active .fl-arrow{color:#00b4d8;animation:blink .8s infinite}
.fl-step.done .fl-arrow{color:#00ff88}

/* ── 하단 버튼 그룹 ── */
.hbot{position:absolute;bottom:0;left:0;right:0;padding:8px 8px 14px;background:linear-gradient(0deg,rgba(0,0,0,.9),transparent);pointer-events:all}
.bgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.abtn{padding:9px 4px;background:rgba(0,0,0,.7);border:1.5px solid rgba(0,180,216,.5);color:#90e0ef;font-size:.72rem;font-weight:700;cursor:pointer;border-radius:4px;text-align:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation;pointer-events:all;user-select:none;transition:all .15s}
.abtn:active,.abtn.sel{background:rgba(0,180,216,.25);border-color:#00b4d8;color:#00b4d8}

/* ── 세부 액션 버튼 행 ── */
#action-row{
  position:absolute;bottom:88px;left:0;right:0;
  padding:0 8px 6px;
  pointer-events:all;display:none;
}
#action-row.on{display:block;animation:su .25s ease}
@keyframes su{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.arow-label{font-size:.55rem;color:#00b4d8;letter-spacing:2px;margin-bottom:5px;padding-left:2px}
.arow-btns{display:flex;gap:5px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.arow-btns::-webkit-scrollbar{display:none}
.dbtn{flex-shrink:0;padding:8px 12px;background:rgba(0,0,0,.65);border:1px solid rgba(0,180,216,.45);color:#90e0ef;font-size:.72rem;font-weight:700;border-radius:4px;cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent;touch-action:manipulation;pointer-events:all;user-select:none;transition:all .15s}
.dbtn:active,.dbtn.act{background:rgba(0,180,216,.22);border-color:#00b4d8;color:#00b4d8}
.dbtn.d{border-color:rgba(255,107,53,.5);color:#ff9966}
.dbtn.d:active{background:rgba(255,107,53,.2);border-color:#ff6b35;color:#ff6b35}
.dbtn.g{border-color:rgba(0,255,136,.4);color:#66ffaa}
.dbtn.g:active{background:rgba(0,255,136,.14);border-color:#00ff88;color:#00ff88}

/* ── 토스트 ── */
#toast{position:absolute;top:62px;left:50%;transform:translateX(-50%);background:rgba(0,180,216,.18);border:1px solid rgba(0,180,216,.55);color:#00b4d8;font-size:.62rem;letter-spacing:1px;padding:7px 16px;border-radius:20px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(6px)}
#toast.on{opacity:1}
</style>
</head>
<body>

<!-- 시작화면 -->
<div id="splash">
  <div class="grid"></div>
  <div class="logo">DC-AR</div>
  <div class="sub">내 방 위의 AI 데이터센터</div>
  <p class="desc">HIRO 마커를 카메라에 비추면<br>미니 AI 데이터센터가 소환됩니다</p>
  <div class="mbox"><div class="hiro"><div class="hiro-in"><div class="hiro-x"></div></div></div></div>
  <div class="mlbl">▲ HIRO MARKER</div>
  <button class="sbtn" id="sBtn">▶ AR 시작</button>
</div>

<!-- AR 씬 -->
<a-scene id="ar-scene" embedded
  arjs="sourceType:webcam;debugUIEnabled:false;detectionMode:mono_and_matrix;"
  vr-mode-ui="enabled:false"
  renderer="logarithmicDepthBuffer:true;antialias:true;">

  <a-marker preset="hiro" id="mk" smooth="true" smoothCount="8">

    <!-- 바닥 -->
    <a-box position="0 -0.02 0" width="3.2" height="0.04" depth="2.2" color="#051428"></a-box>
    <a-plane position="0 0.001 0" rotation="-90 0 0" width="3.2" height="2.2" color="#001f3f" opacity="0.8" side="double"></a-plane>

    <!-- 서버 랙 1 -->
    <a-entity id="rack1" position="-1.1 0 -0.6">
      <a-box id="rack1-body" width="0.35" height="0.9" depth="0.55" color="#0a1628"></a-box>
      <a-box position="0 0 0.28" width="0.33" height="0.88" depth="0.02" color="#0d1f38"></a-box>
      <a-box id="led1a" position="0 0.3 0.295" width="0.25" height="0.03" depth="0.01" color="#00b4d8" animation="property:material.opacity;from:1;to:0.2;dur:800;loop:true;dir:alternate"></a-box>
      <a-box id="led1b" position="0 0.15 0.295" width="0.25" height="0.03" depth="0.01" color="#00ff88" animation="property:material.opacity;from:0.2;to:1;dur:600;loop:true;dir:alternate"></a-box>
      <a-box id="led1c" position="0 0 0.295" width="0.25" height="0.03" depth="0.01" color="#00b4d8" animation="property:material.opacity;from:1;to:0.3;dur:1000;loop:true;dir:alternate"></a-box>
      <a-box id="led1d" position="0 -0.15 0.295" width="0.25" height="0.03" depth="0.01" color="#ff6b35" animation="property:material.opacity;from:0.5;to:1;dur:700;loop:true;dir:alternate"></a-box>
      <a-sphere id="top1" position="0 0.47 0.295" radius="0.025" color="#00ff88" material="emissive:#00ff88;" animation="property:material.emissiveIntensity;from:0.5;to:2;dur:1000;loop:true;dir:alternate"></a-sphere>
    </a-entity>

    <!-- 서버 랙 2 -->
    <a-entity id="rack2" position="-0.65 0 -0.6">
      <a-box id="rack2-body" width="0.35" height="0.9" depth="0.55" color="#0a1628"></a-box>
      <a-box position="0 0 0.28" width="0.33" height="0.88" depth="0.02" color="#0d1f38"></a-box>
      <a-box id="led2a" position="0 0.3 0.295" width="0.25" height="0.03" depth="0.01" color="#00ff88" animation="property:material.opacity;from:0.3;to:1;dur:500;loop:true;dir:alternate"></a-box>
      <a-box id="led2b" position="0 0.1 0.295" width="0.25" height="0.03" depth="0.01" color="#00b4d8" animation="property:material.opacity;from:1;to:0.2;dur:900;loop:true;dir:alternate"></a-box>
      <a-sphere id="top2" position="0 0.47 0.295" radius="0.025" color="#ff6b35" material="emissive:#ff6b35;" animation="property:material.emissiveIntensity;from:0.5;to:2;dur:800;loop:true;dir:alternate"></a-sphere>
    </a-entity>

    <!-- 서버 랙 3 -->
    <a-entity id="rack3" position="-0.2 0 -0.6">
      <a-box id="rack3-body" width="0.35" height="0.9" depth="0.55" color="#0a1628"></a-box>
      <a-box position="0 0 0.28" width="0.33" height="0.88" depth="0.02" color="#0d1f38"></a-box>
      <a-box id="led3a" position="0 0.25 0.295" width="0.25" height="0.04" depth="0.01" color="#00b4d8" animation="property:material.opacity;from:1;to:0.1;dur:400;loop:true;dir:alternate"></a-box>
      <a-box id="led3b" position="0 0.05 0.295" width="0.25" height="0.04" depth="0.01" color="#00ff88" animation="property:material.opacity;from:0.5;to:1;dur:750;loop:true;dir:alternate"></a-box>
      <a-sphere id="top3" position="0 0.47 0.295" radius="0.025" color="#00ff88" material="emissive:#00ff88;" animation="property:material.emissiveIntensity;from:0.5;to:2;dur:600;loop:true;dir:alternate"></a-sphere>
    </a-entity>

    <!-- 냉각 유닛 -->
    <a-entity position="0.4 0 -0.55">
      <a-box width="0.6" height="0.8" depth="0.5" color="#081220"></a-box>
      <a-entity position="-0.12 0.15 0.28">
        <a-cylinder height="0.02" radius="0.1" color="#1a2f4a"></a-cylinder>
        <a-entity id="fan1" animation="property:rotation;to:0 0 360;dur:800;loop:true;easing:linear;">
          <a-box position="0 0.015 0" width="0.18" height="0.02" depth="0.04" color="#00b4d8"></a-box>
          <a-box position="0 0.015 0" width="0.04" height="0.02" depth="0.18" color="#00b4d8"></a-box>
        </a-entity>
      </a-entity>
      <a-entity position="0.12 0.15 0.28">
        <a-cylinder height="0.02" radius="0.1" color="#1a2f4a"></a-cylinder>
        <a-entity id="fan2" animation="property:rotation;to:0 0 -360;dur:1000;loop:true;easing:linear;">
          <a-box position="0 0.015 0" width="0.18" height="0.02" depth="0.04" color="#90e0ef"></a-box>
          <a-box position="0 0.015 0" width="0.04" height="0.02" depth="0.18" color="#90e0ef"></a-box>
        </a-entity>
      </a-entity>
      <a-sphere id="coolant" position="-0.18 -0.28 0.27" radius="0.05" color="#00b4d8" material="emissive:#00b4d8;emissiveIntensity:1;" animation="property:position;from:-0.18 -0.28 0.27;to:0.18 -0.28 0.27;dur:1500;loop:true;dir:alternate;easing:easeInOutSine;"></a-sphere>
    </a-entity>

    <!-- 네트워크 스위치 -->
    <a-entity position="0.4 0 0.35">
      <a-box width="0.6" height="0.18" depth="0.4" color="#080f1e"></a-box>
      <a-sphere id="port1" position="-0.2 0.1 0.21" radius="0.015" color="#00ff88" material="emissive:#00ff88;" animation="property:material.emissiveIntensity;from:0.5;to:3;dur:300;loop:true;dir:alternate"></a-sphere>
      <a-sphere id="port2" position="-0.13 0.1 0.21" radius="0.015" color="#00b4d8" material="emissive:#00b4d8;" animation="property:material.emissiveIntensity;from:0.5;to:3;dur:500;loop:true;dir:alternate"></a-sphere>
      <a-sphere id="port3" position="-0.06 0.1 0.21" radius="0.015" color="#00ff88" material="emissive:#00ff88;" animation="property:material.emissiveIntensity;from:0.5;to:3;dur:400;loop:true;dir:alternate"></a-sphere>
      <a-sphere id="port4" position="0.01 0.1 0.21" radius="0.015" color="#ff6b35" material="emissive:#ff6b35;" animation="property:material.emissiveIntensity;from:0.5;to:3;dur:700;loop:true;dir:alternate"></a-sphere>
      <!-- 데이터 패킷 -->
      <a-sphere id="pkt1" radius="0.02" color="#00b4d8" material="emissive:#00b4d8;emissiveIntensity:2;" animation="property:position;from:-0.28 0.05 0.2;to:0.28 0.05 0.2;dur:1200;loop:true;easing:linear;"></a-sphere>
      <a-sphere id="pkt2" radius="0.02" color="#00ff88" material="emissive:#00ff88;emissiveIntensity:2;" animation="property:position;from:0.28 0.05 -0.2;to:-0.28 0.05 -0.2;dur:900;loop:true;easing:linear;"></a-sphere>
    </a-entity>

    <!-- UPS -->
    <a-entity position="-0.7 0 0.4">
      <a-box width="0.4" height="0.5" depth="0.35" color="#060d1a"></a-box>
      <a-sphere id="ups-led" position="0 0.26 0.19" radius="0.03" color="#00ff88" material="emissive:#00ff88;emissiveIntensity:1.5;" animation="property:material.emissiveIntensity;from:1;to:3;dur:2000;loop:true;dir:alternate"></a-sphere>
      <a-box position="0 0.1 0.18" width="0.3" height="0.02" depth="0.01" color="#ff6b35" animation="property:material.opacity;from:0.3;to:1;dur:500;loop:true;dir:alternate"></a-box>
      <a-text value="UPS" position="0 -0.28 0.18" align="center" color="#ff6b35" width="1" font="mozillavr"></a-text>
    </a-entity>

    <!-- 발전기 -->
    <a-entity position="1.1 0 0.4">
      <a-box width="0.5" height="0.45" depth="0.7" color="#0c1a0c"></a-box>
      <a-sphere id="gen-led" position="0 -0.1 0.375" radius="0.03" color="#00ff88" material="emissive:#00ff88;emissiveIntensity:1.5;" animation="property:material.emissiveIntensity;from:1;to:3;dur:1500;loop:true;dir:alternate"></a-sphere>
      <a-text value="GEN" position="0 -0.28 0.37" align="center" color="#00ff88" width="1" font="mozillavr"></a-text>
    </a-entity>

    <!-- AI 학습 진행 링 (기본 숨김) -->
    <a-entity id="ai-ring" position="0 1.2 0" visible="false">
      <a-torus radius="0.3" radius-tubular="0.02" color="#00b4d8" material="emissive:#00b4d8;emissiveIntensity:1;" animation="property:rotation;to:0 360 0;dur:3000;loop:true;easing:linear;"></a-torus>
    </a-entity>

    <!-- AI 단계 구슬 (기본 숨김) -->
    <a-sphere id="ai-ball" position="0 0.8 0" radius="0.06" color="#00b4d8" material="emissive:#00b4d8;emissiveIntensity:2;" visible="false" animation="property:position;from:-0.8 0.8 0;to:0.8 0.8 0;dur:2000;loop:true;dir:alternate;easing:easeInOutSine;"></a-sphere>

    <!-- 전류 케이블 -->
    <a-sphere id="pwr1" radius="0.025" color="#ff6b35" material="emissive:#ff6b35;emissiveIntensity:2;" animation="property:position;from:1.1 0.07 0.4;to:-0.7 0.07 0.4;dur:1800;loop:true;easing:linear;"></a-sphere>
    <a-sphere id="pwr2" radius="0.025" color="#ffdd00" material="emissive:#ffdd00;emissiveIntensity:2;" animation="property:position;from:-0.7 0.07 0.4;to:-0.7 0.07 -0.6;dur:1400;loop:true;easing:linear;"></a-sphere>
    <a-sphere id="pwr3" radius="0.02" color="#00b4d8" material="emissive:#00b4d8;emissiveIntensity:2;" animation="property:position;from:-1.15 0.07 -0.6;to:-0.28 0.07 -0.6;dur:1000;loop:true;easing:linear;"></a-sphere>

    <a-text value="AI DATA CENTER" position="0 1.1 0" align="center" color="#00b4d8" width="3" font="mozillavr" opacity="0.7"></a-text>
  </a-marker>
  <a-entity camera></a-entity>
</a-scene>

<!-- AR UI -->
<div id="ar-ui">
  <div class="htop">
    <div class="htitle">DC-AR // AI DATACENTER</div>
    <div class="hstat"><div class="dot"></div><span id="stxt">마커 탐색 중...</span></div>
  </div>

  <!-- 스캔 가이드 -->
  <div id="sg"><div class="sf"><div class="sl"></div></div><div class="st">HIRO 마커를 카메라에 비추세요</div></div>

  <!-- 모드 배너 -->
  <div id="mode-banner"></div>

  <!-- 결과 오버레이 (오른쪽 상단 반투명) -->
  <div id="overlay">
    <div class="ov-tag" id="ovTag">STATUS</div>
    <div class="ov-title" id="ovTitle"></div>
    <div class="ov-body" id="ovBody"></div>
  </div>

  <!-- AI 흐름 오버레이 (왼쪽 상단 반투명) -->
  <div id="flow-overlay">
    <div class="fl-tag">AI PIPELINE</div>
    <div class="fl-step" id="fs0"><div class="fsdot"></div>데이터 수집<span class="fl-arrow">→</span></div>
    <div class="fl-step" id="fs1"><div class="fsdot"></div>전처리<span class="fl-arrow">→</span></div>
    <div class="fl-step" id="fs2"><div class="fsdot"></div>모델 학습<span class="fl-arrow">→</span></div>
    <div class="fl-step" id="fs3"><div class="fsdot"></div>추론/배포<span class="fl-arrow">✓</span></div>
  </div>

  <!-- 세부 액션 버튼 행 -->
  <div id="action-row">
    <div class="arow-label" id="arow-label">세부 액션</div>
    <div class="arow-btns" id="arow-btns"></div>
  </div>

  <!-- 하단 메인 버튼 -->
  <div class="hbot">
    <div class="bgrid">
      <button class="abtn" id="b1">🖥 서버</button>
      <button class="abtn" id="b2">🌡 온도</button>
      <button class="abtn" id="b3">🤖 AI학습</button>
      <button class="abtn" id="b4">⚡ 전력</button>
      <button class="abtn" id="b5">🔌 케이블</button>
    </div>
  </div>

  <div id="toast"></div>
</div>

<script>
// ── 전역 상태 ──
var tTimer=null, pTimer=null, aiTimer=null, aiStep=0, aiRunning=false;

// ── 시작 버튼 ──
document.getElementById('sBtn').addEventListener('click',function(){
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    alert('Chrome 또는 Safari를 사용하세요.');return;
  }
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
    .then(function(s){s.getTracks().forEach(function(t){t.stop();});launchAR();})
    .catch(function(e){alert('카메라 권한을 허용해주세요.\n'+e.message);});
});

function launchAR(){
  var sp=document.getElementById('splash');
  sp.classList.add('hide');
  setTimeout(function(){sp.style.display='none';},700);
  document.getElementById('ar-scene').style.display='block';
  document.getElementById('ar-ui').classList.add('on');
  function bind(){
    var mk=document.getElementById('mk');
    if(!mk){setTimeout(bind,300);return;}
    mk.addEventListener('markerFound',function(){
      document.getElementById('sg').style.display='none';
      document.getElementById('stxt').textContent='데이터센터 활성화 ✓';
      toast('🏗 AI 데이터센터 소환됨');
    });
    mk.addEventListener('markerLost',function(){
      document.getElementById('sg').style.display='block';
      document.getElementById('stxt').textContent='마커 탐색 중...';
    });
  }
  var sc=document.getElementById('ar-scene');
  if(sc.hasLoaded){bind();}else{sc.addEventListener('loaded',bind);setTimeout(bind,1000);}
}

// ── 토스트 ──
var tTmr=null;
function toast(m){
  var t=document.getElementById('toast');
  t.textContent=m;t.classList.add('on');
  if(tTmr)clearTimeout(tTmr);
  tTmr=setTimeout(function(){t.classList.remove('on');},2500);
}

// ── 모드 배너 ──
function setBanner(txt){
  var b=document.getElementById('mode-banner');
  b.textContent=txt;b.classList.add('on');
}
function hideBanner(){document.getElementById('mode-banner').classList.remove('on');}

// ── 결과 오버레이 ──
function showOverlay(tag,title,html){
  document.getElementById('ovTag').textContent=tag;
  document.getElementById('ovTitle').textContent=title;
  document.getElementById('ovBody').innerHTML=html;
  document.getElementById('overlay').classList.add('on');
  setTimeout(function(){
    document.querySelectorAll('.mbf[data-w]').forEach(function(e){
      e.style.width=e.getAttribute('data-w')+'%';
    });
  },60);
}
function hideOverlay(){document.getElementById('overlay').classList.remove('on');}

// ── AI 흐름 오버레이 ──
function showFlow(){document.getElementById('flow-overlay').classList.add('on');}
function hideFlow(){document.getElementById('flow-overlay').classList.remove('on');}
function setFlowStep(idx,state){
  for(var i=0;i<4;i++){
    var el=document.getElementById('fs'+i);
    el.classList.remove('active','done','broken');
    if(i<idx) el.classList.add('done');
    else if(i===idx) el.classList.add(state||'active');
  }
}
function resetFlow(){for(var i=0;i<4;i++){var el=document.getElementById('fs'+i);el.classList.remove('active','done','broken');}}

// ── 미니바 HTML ──
function mb(lbl,pct,col){
  return '<div class="mb"><div class="mbt"><span>'+lbl+'</span>'
    +'<span style="color:'+col+';font-weight:700;">'+pct+'%</span></div>'
    +'<div class="mbb"><div class="mbf" data-w="'+pct+'" style="background:'+col+'"></div></div></div>';
}

// ── 3D 오브젝트 색상 변경 헬퍼 ──
function setLED(id,color){
  var el=document.getElementById(id);
  if(el)el.setAttribute('color',color);
}
function setEmissive(id,color){
  var el=document.getElementById(id);
  if(el)el.setAttribute('material','emissive:'+color+';emissiveIntensity:2;');
}
function setPktSpeed(id,dur){
  var el=document.getElementById(id);
  if(!el)return;
  var anim=el.getAttribute('animation');
  if(anim)el.setAttribute('animation',anim.replace(/dur:\d+/,'dur:'+dur));
}

// ── 세부 버튼 행 ──
function openActionRow(label,btns){
  document.getElementById('arow-label').textContent=label;
  var w=document.getElementById('arow-btns');
  w.innerHTML='';
  btns.forEach(function(b){
    var el=document.createElement('button');
    el.className='dbtn'+(b.c?' '+b.c:'');
    el.textContent=b.l;
    el.style.cssText='pointer-events:all;touch-action:manipulation;';
    var fired=false;
    function doIt(){
      if(fired)return;fired=true;setTimeout(function(){fired=false;},600);
      document.querySelectorAll('.dbtn').forEach(function(x){x.classList.remove('act');});
      el.classList.add('act');
      b.fn();
    }
    el.addEventListener('touchend',function(e){e.preventDefault();doIt();},{passive:false});
    el.addEventListener('click',function(e){e.stopPropagation();doIt();});
    w.appendChild(el);
  });
  document.getElementById('action-row').classList.add('on');
}
function closeActionRow(){document.getElementById('action-row').classList.remove('on');}

// ── 메인 버튼 상태 ──
function selBtn(id){
  ['b1','b2','b3','b4','b5'].forEach(function(b){document.getElementById(b).classList.remove('sel');});
  if(id)document.getElementById(id).classList.add('sel');
}

// ── 리셋 ──
function resetAll(){
  if(tTimer){clearInterval(tTimer);tTimer=null;}
  if(pTimer){clearInterval(pTimer);pTimer=null;}
  stopAI();
  hideOverlay();hideFlow();hideBanner();closeActionRow();
  // 3D 리셋
  ['led1a','led1b','led1c','led1d'].forEach(function(id){setLED(id,'#00b4d8');});
  setLED('led2a','#00ff88');setLED('led2b','#00b4d8');
  setLED('led3a','#00b4d8');setLED('led3b','#00ff88');
  setPktSpeed('pkt1',1200);setPktSpeed('pkt2',900);
  try{document.getElementById('ai-ring').setAttribute('visible','false');}catch(e){}
  try{document.getElementById('ai-ball').setAttribute('visible','false');}catch(e){}
}

// ── AI 학습 관련 ──
function stopAI(){
  if(aiTimer){clearInterval(aiTimer);aiTimer=null;}
  aiRunning=false;
  try{document.getElementById('ai-ring').setAttribute('visible','false');}catch(e){}
  try{document.getElementById('ai-ball').setAttribute('visible','false');}catch(e){}
}

// ══════════════════════════
// 🖥 서버 버튼
// ══════════════════════════
document.getElementById('b1').addEventListener('touchend',function(e){e.preventDefault();doServer();},{passive:false});
document.getElementById('b1').addEventListener('click',function(){doServer();});
function doServer(){
  resetAll();selBtn('b1');
  setBanner('🖥 SERVER MODE');
  toast('🖥 서버 시스템 연결됨');
  openActionRow('서버 제어',[
    {l:'📊 CPU 부하',c:'',fn:function(){
      // 3D: 부하 높으면 LED 빨간색으로
      var a=Math.round(55+Math.random()*30),b=Math.round(40+Math.random()*40),c=Math.round(60+Math.random()*25);
      setLED('led1a', a>80?'#ff6b35':'#00b4d8');
      setLED('led2a', b>80?'#ff6b35':'#00ff88');
      setLED('led3a', c>80?'#ff6b35':'#00b4d8');
      // 패킷 속도: 부하 높으면 빠르게
      var avgLoad=(a+b+c)/3;
      setPktSpeed('pkt1', avgLoad>70?600:1200);
      setPktSpeed('pkt2', avgLoad>70?450:900);
      showOverlay('CPU STATUS','CPU 부하 분석',mb('Rack A',a,a>80?'#ff6b35':'#00b4d8')+mb('Rack B',b,b>80?'#ff6b35':'#00ff88')+mb('Rack C',c,c>80?'#ff6b35':'#00b4d8'));
      toast(avgLoad>80?'⚠ 과부하! LED 적색':'✅ CPU 정상 — LED 청색');
    }},
    {l:'💾 메모리',c:'',fn:function(){
      var u=Math.round(60+Math.random()*25);
      setLED('led1b', u>85?'#ff6b35':'#00ff88');
      setLED('led2b', u>85?'#ff6b35':'#00b4d8');
      showOverlay('MEMORY','메모리 현황',mb('RAM 사용률',u,u>85?'#ff6b35':'#00b4d8')+'<div style="margin-top:4px;font-size:.68rem;color:#adb5bd;">여유: '+Math.round(512*(1-u/100))+'GB</div>');
      toast('💾 메모리 '+(u>85?'⚠ 부족!':'✅ 정상'));
    }},
    {l:'🌐 네트워크',c:'',fn:function(){
      var i=(Math.random()*8+1).toFixed(1),o=(Math.random()*6+0.5).toFixed(1);
      setPktSpeed('pkt1',Math.round(1500-parseFloat(i)*100));
      showOverlay('NETWORK','네트워크 I/O','<div style="display:flex;gap:10px;"><div><div style="font-size:.58rem;color:#00b4d8;">IN</div><div>'+i+' Gbps</div></div><div><div style="font-size:.58rem;color:#ff6b35;">OUT</div><div>'+o+' Gbps</div></div></div>');
      toast('🌐 패킷 흐름 가시화됨');
    }},
    {l:'🔄 재시작',c:'d',fn:function(){
      // 3D: LED 전부 끄기 → 점진적으로 켜짐
      ['led1a','led1b','led1c','led1d','led2a','led2b','led3a','led3b'].forEach(function(id){setLED(id,'#333333');});
      setBanner('🔄 서버 재시작 중...');
      showOverlay('RESTART','재부팅 중...','<div style="color:#ff6b35;">3...</div>');
      var n=3,t=setInterval(function(){
        n--;
        if(n>0){document.getElementById('ovBody').innerHTML='<div style="color:#ff6b35;">'+n+'...</div>';}
        else{
          clearInterval(t);
          // 3D: LED 다시 켜짐
          setLED('led1a','#00b4d8');setLED('led1b','#00ff88');setLED('led2a','#00ff88');setLED('led3a','#00b4d8');
          setBanner('✅ 서버 재시작 완료');
          document.getElementById('ovBody').innerHTML='<div style="color:#00ff88;">✅ 재부팅 완료</div>';
          toast('✅ 서버 정상 가동!');
        }
      },1000);
    }},
  ]);
}

// ══════════════════════════
// 🌡 온도 버튼
// ══════════════════════════
document.getElementById('b2').addEventListener('touchend',function(e){e.preventDefault();doTemp();},{passive:false});
document.getElementById('b2').addEventListener('click',function(){doTemp();});
function doTemp(){
  resetAll();selBtn('b2');
  setBanner('🌡 THERMAL MODE');
  var tv=42;
  function updateTemp(){
    tv+=(Math.random()-.45)*3;tv=Math.max(28,Math.min(75,tv));
    var pct=Math.round((tv-28)/47*100);
    var col=tv>60?'#ff6b35':tv>50?'#ffdd00':'#00b4d8';
    // 3D: 냉각구 색상 변화
    var cool=document.getElementById('coolant');
    if(cool)cool.setAttribute('color',col);
    showOverlay('THERMAL','냉각 시스템',
      '<div style="font-size:1.1rem;font-weight:700;color:'+col+';">'+tv.toFixed(1)+'°C</div>'+
      mb('온도 수준',pct,col)+
      '<div style="font-size:.68rem;color:#adb5bd;margin-top:4px;">팬 속도: '+Math.round(50+pct/2)+'%</div>'
    );
    if(tv>60)toast('🔥 고온! 냉각구 적색');
  }
  updateTemp();
  tTimer=setInterval(updateTemp,1200);
  openActionRow('냉각 제어',[
    {l:'🌬 팬 증속',c:'',fn:function(){
      tv=Math.max(28,tv-8);
      var cool=document.getElementById('coolant');
      if(cool)cool.setAttribute('color','#00b4d8');
      setBanner('🌬 팬 증속 중...');toast('🌬 냉각 팬 증속 — 온도 하강 중');
    }},
    {l:'❄ 팬 감속',c:'',fn:function(){
      tv=Math.min(75,tv+5);
      setBanner('❄ 팬 감속 (절전)');toast('❄ 팬 속도 감소 — 절전 모드');
    }},
    {l:'💧 냉각수',c:'',fn:function(){
      showOverlay('COOLANT','냉각수 상태',mb('잔량',78,'#00b4d8')+'<div style="font-size:.68rem;color:#00ff88;margin-top:4px;">유량: '+(12+Math.random()*3).toFixed(1)+' L/min ✅</div>');
      toast('💧 냉각수 정상 순환');
    }},
    {l:'🚨 긴급냉각',c:'d',fn:function(){
      tv=Math.max(28,tv-20);
      var cool=document.getElementById('coolant');
      if(cool){cool.setAttribute('color','#00ffff');cool.setAttribute('material','emissive:#00ffff;emissiveIntensity:3;');}
      setBanner('🚨 긴급 냉각 가동!');
      showOverlay('EMERGENCY','긴급 냉각',mb('팬 A',100,'#ff6b35')+mb('팬 B',100,'#ff6b35')+'<div style="font-size:.68rem;color:#ffdd00;margin-top:4px;">예상 -15°C / 120초</div>');
      toast('🚨 긴급 냉각 가동!');
    }},
  ]);
  toast('🌡 냉각 시스템 연결됨');
}

// ══════════════════════════
// 🤖 AI 학습 버튼
// ══════════════════════════
document.getElementById('b3').addEventListener('touchend',function(e){e.preventDefault();doAI();},{passive:false});
document.getElementById('b3').addEventListener('click',function(){doAI();});
function doAI(){
  resetAll();selBtn('b3');
  setBanner('🤖 AI TRAINING MODE');
  showFlow();resetFlow();
  openActionRow('AI 파이프라인',[
    {l:'▶ 학습 시작',c:'g',fn:function(){
      if(aiRunning){toast('이미 학습 중입니다');return;}
      startAITraining();
    }},
    {l:'⏸ 학습 중단',c:'d',fn:function(){
      if(!aiRunning){toast('학습 중이 아닙니다');return;}
      pauseAITraining();
    }},
    {l:'📊 현재 상태',c:'',fn:function(){
      showOverlay('AI STATUS','학습 현황',mb('Loss',Math.round(20+Math.random()*30),'#ff6b35')+mb('Accuracy',Math.round(70+Math.random()*20),'#00ff88')+'<div style="font-size:.68rem;color:#adb5bd;margin-top:4px;">lr: 0.001 | epoch: '+Math.round(aiStep*12)+'</div>');
      toast('📊 현재 학습 상태');
    }},
    {l:'🔄 초기화',c:'d',fn:function(){
      stopAI();resetFlow();
      setBanner('🔄 파이프라인 초기화');
      showOverlay('RESET','초기화 완료','<div style="color:#ffdd00;">모든 학습 데이터 초기화됨</div>');
      ['led1a','led1b','led1c','led1d'].forEach(function(id){setLED(id,'#00b4d8');});
      toast('🔄 초기화 완료');
    }},
  ]);
  toast('🤖 AI 시스템 연결됨');
}

function startAITraining(){
  aiRunning=true;aiStep=0;
  var steps=['데이터 수집','전처리','모델 학습','추론/배포'];
  var colors=['#90e0ef','#00b4d8','#00ff88','#ffdd00'];
  // 3D: AI 링 + 구슬 표시
  try{document.getElementById('ai-ring').setAttribute('visible','true');}catch(e){}
  try{document.getElementById('ai-ball').setAttribute('visible','true');}catch(e){}
  // LED를 AI 색상으로 순차 변경
  function runStep(){
    if(!aiRunning||aiStep>=4){
      if(aiStep>=4){
        setBanner('✅ AI 학습 완료!');
        showOverlay('COMPLETE','학습 완료!',mb('Accuracy',94,'#00ff88')+mb('Loss',6,'#00b4d8')+'<div style="font-size:.68rem;color:#00ff88;margin-top:4px;">✅ 모델 배포 완료</div>');
        toast('✅ AI 학습 완료! 모델 배포됨');
        stopAI();
      }
      return;
    }
    setFlowStep(aiStep,'active');
    setBanner('🤖 '+steps[aiStep]+' 진행 중...');
    // 3D: 각 단계마다 서버 LED 색상 변화
    var c=colors[aiStep];
    setLED('led1a',c);setLED('led2a',c);setLED('led3a',c);
    if(aiStep===2){
      // 학습 단계: 패킷 빠르게
      setPktSpeed('pkt1',400);setPktSpeed('pkt2',300);
    }
    showOverlay('AI STEP '+(aiStep+1)+'/4',steps[aiStep],
      mb('진행률',Math.round((aiStep+1)/4*100),'#00b4d8')+
      '<div style="font-size:.68rem;color:#90e0ef;margin-top:4px;">처리 중: '+['128,420건','전처리 완료','epoch '+(aiStep*12+1),'추론 테스트'][aiStep]+'</div>'
    );
    toast('→ '+steps[aiStep]+' 시작');
    aiStep++;
    aiTimer=setTimeout(runStep,2500);
  }
  runStep();
}

function pauseAITraining(){
  if(aiTimer){clearTimeout(aiTimer);aiTimer=null;}
  aiRunning=false;
  // 3D: 현재 단계 LED 적색으로 (흐름 끊김 표시)
  setLED('led1a','#ff6b35');setLED('led2a','#ff6b35');setLED('led3a','#ff6b35');
  setPktSpeed('pkt1',3000);setPktSpeed('pkt2',4000);
  // 현재 단계 broken 표시
  if(aiStep>0)setFlowStep(aiStep-1,'broken');
  try{document.getElementById('ai-ball').setAttribute('visible','false');}catch(e){}
  setBanner('⏸ 학습 중단됨 — 단계 '+(aiStep)+'/4');
  showOverlay('PAUSED','학습 중단','<div style="color:#ff6b35;margin-bottom:6px;">⚠ '+['데이터 수집','전처리','모델 학습','추론'][Math.max(0,aiStep-1)]+' 단계에서 중단됨</div><div style="font-size:.68rem;color:#adb5bd;">체크포인트 자동 저장 완료<br>▶ 학습 시작으로 재개 가능</div>');
  toast('⏸ 학습 중단 — LED 적색 표시');
}

// ══════════════════════════
// ⚡ 전력 버튼
// ══════════════════════════
document.getElementById('b4').addEventListener('touchend',function(e){e.preventDefault();doPower();},{passive:false});
document.getElementById('b4').addEventListener('click',function(){doPower();});
function doPower(){
  resetAll();selBtn('b4');
  setBanner('⚡ POWER MODE');
  var load=4.2;
  function updatePower(){
    load+=(Math.random()-.45)*.4;load=Math.max(3,Math.min(9,load));
    var col=load>7?'#ff6b35':load>5?'#ffdd00':'#00ff88';
    // 3D: 전력 높으면 UPS LED 빨간색
    setEmissive('ups-led',load>7?'#ff6b35':'#00ff88');
    showOverlay('POWER','전력 현황',
      mb('서버 소비전력',Math.round(load/9*100),col)+
      '<div style="font-size:.68rem;color:#adb5bd;margin-top:4px;">'+load.toFixed(1)+'kW | UPS: 98% | PUE: '+(1.2+load/90).toFixed(2)+'</div>'
    );
    if(load>7)toast('⚠ 전력 과부하! UPS LED 적색');
  }
  updatePower();
  pTimer=setInterval(updatePower,1200);
  openActionRow('전력 제어',[
    {l:'🔋 UPS 점검',c:'',fn:function(){
      var ch=Math.round(88+Math.random()*10);
      setEmissive('ups-led',ch>90?'#00ff88':'#ffdd00');
      showOverlay('UPS','UPS 상태',mb('배터리',ch,ch>90?'#00ff88':'#ffdd00')+'<div style="font-size:.68rem;color:#adb5bd;margin-top:4px;">백업: '+Math.round(ch*.18)+'분</div>');
      toast('🔋 UPS '+ch+'% — LED 확인');
    }},
    {l:'⚖ 부하분산',c:'',fn:function(){
      showOverlay('BALANCE','부하 분산',mb('회로 A',68,'#00b4d8')+mb('회로 B',42,'#00ff88')+mb('회로 C',31,'#90e0ef'));
      toast('⚖ 부하 분산 최적화');
    }},
    {l:'🌿 절전모드',c:'g',fn:function(){
      load=Math.max(3,load-1.5);
      setEmissive('ups-led','#00ff88');
      setEmissive('gen-led','#00ff88');
      setBanner('🌿 절전 모드 활성화');
      showOverlay('ECO','절전 모드',mb('절감률',28,'#00ff88')+'<div style="font-size:.68rem;color:#00ff88;margin-top:4px;">월 약 87,000원 절약</div>');
      toast('🌿 절전 — 발전기 LED 녹색');
    }},
    {l:'⚡ 풀파워',c:'d',fn:function(){
      load=Math.min(9,load+2);
      setEmissive('ups-led','#ff6b35');
      setEmissive('gen-led','#ff6b35');
      setPktSpeed('pkt1',400);setPktSpeed('pkt2',300);
      setBanner('⚡ 풀 파워 모드!');
      showOverlay('FULL PWR','풀 파워',mb('출력',98,'#ff6b35')+'<div style="font-size:.68rem;color:#ffdd00;margin-top:4px;">⚠ 소비 8.4kW — 발전기 LED 적색</div>');
      toast('⚡ 풀파워 — 패킷 최고속!');
    }},
  ]);
  toast('⚡ 전력 시스템 연결됨');
}

// ══════════════════════════
// 🔌 케이블 버튼
// ══════════════════════════
document.getElementById('b5').addEventListener('touchend',function(e){e.preventDefault();doCable();},{passive:false});
document.getElementById('b5').addEventListener('click',function(){doCable();});
function doCable(){
  resetAll();selBtn('b5');
  setBanner('🔌 CABLE MODE');
  openActionRow('케이블 진단',[
    {l:'🔍 자동진단',c:'',fn:function(){
      var steps=['배선 연속성...','신호 측정...','절연 저항...'];
      var i=0;
      showOverlay('SCAN','자동 진단',steps[0]);
      var t=setInterval(function(){
        i++;
        if(i<steps.length){document.getElementById('ovBody').innerHTML=steps[i];}
        else{
          clearInterval(t);
          // 3D: 이상 케이블 포트 LED 적색
          setEmissive('port4','#ff6b35');
          showOverlay('RESULT','진단 완료','<div style="color:#00ff88;margin-bottom:4px;">✅ 정상: 4개</div><div style="color:#ff6b35;">⚠ 비상전력 신호 저하<br>포트 4 LED 적색 확인</div>');
          toast('🔍 이상 감지 — 포트4 적색');
        }
      },900);
    }},
    {l:'🔧 케이블교체',c:'d',fn:function(){
      setTimeout(function(){
        setEmissive('port4','#00ff88');
        showOverlay('FIXED','교체 완료','<div style="color:#00ff88;margin-bottom:4px;">✅ 비상전력 라인 교체</div><div style="font-size:.68rem;color:#adb5bd;">Cat6A→Cat7<br>포트 4 LED 녹색 복구</div>');
        toast('🔧 교체 완료 — 포트 LED 녹색!');
      },1500);
    }},
    {l:'📡 신호측정',c:'',fn:function(){
      showOverlay('SIGNAL','신호 강도',mb('발전기→UPS',97,'#00ff88')+mb('UPS→Rack',94,'#00b4d8')+mb('비상전력',38,'#ff6b35'));
      toast('📡 신호 측정 완료');
    }},
    {l:'✅ 점검완료',c:'g',fn:function(){
      showOverlay('REPORT','점검 완료','<div style="font-size:.7rem;color:#adb5bd;line-height:1.8;">정상: 4개 | 이상: 1개<br>다음 점검: 30일 후<br>'+new Date().toLocaleString('ko-KR')+'</div>');
      toast('✅ 점검 보고서 저장');
    }},
  ]);
  toast('🔌 케이블 진단 연결됨');
}
</script>
